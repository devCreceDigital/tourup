services:
  postgres:
    image: postgres:16-alpine
    container_name: totem_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-totem_hub}
      POSTGRES_USER: ${POSTGRES_USER:-totem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-totem_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-totem} -d ${POSTGRES_DB:-totem_hub}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: totem_redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: totem_pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@totem.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: totem_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-change-me}
      APP_ENV: ${APP_ENV:-local}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      TENANCY_HEADER_NAME: ${TENANCY_HEADER_NAME:-X-Tenant-ID}
      TENANCY_ROOT_HOSTS: ${TENANCY_ROOT_HOSTS:-localhost,127.0.0.1,backend}
      TENANCY_EXEMPT_PATH_PREFIXES: ${TENANCY_EXEMPT_PATH_PREFIXES:-/health/,/admin/,/api/tenants/,/api/debug-auth/}
      DB_RLS_CONTEXT_ENABLED: ${DB_RLS_CONTEXT_ENABLED:-True}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-app-jwt-secret}
      APP_JWT_ISSUER: ${APP_JWT_ISSUER:-totem-backend}
      APP_JWT_ACCESS_MINUTES: ${APP_JWT_ACCESS_MINUTES:-15}
      APP_JWT_REFRESH_DAYS: ${APP_JWT_REFRESH_DAYS:-7}
      DATABASE_URL: postgresql://${POSTGRES_USER:-totem}:${POSTGRES_PASSWORD:-totem_dev_password}@postgres:5432/${POSTGRES_DB:-totem_hub}
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-dev-supabase-jwt-secret}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_APP_URL: ${OPENROUTER_APP_URL:-http://localhost:3000}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-Totem HUB}
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
    container_name: totem_frontend
    depends_on:
      backend:
        condition: service_started
    working_dir: /app
    command: sh -c "npm install && npm run build && npm run start -- -p 3001"
    #command: npm run dev -- --hostname 0.0.0.0 --port 3001
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_USE_MOCK_API: ${NEXT_PUBLIC_USE_MOCK_API:-false}
      NEXT_PUBLIC_DJANGO_API_URL: ${NEXT_PUBLIC_DJANGO_API_URL:-http://localhost:8000/api}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    ports:
      - "${FRONTEND_PORT:-3001}:3001"

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  frontend_node_modules:
