openapi: 3.0.3
info:
  title: Totem HUB API
  version: 0.1.0
  description: |
    Contrato OpenAPI 3.0 para los endpoints base del SaaS multi-tenant Totem HUB.

    Este contrato documenta:
    - Resolucion de tenant por `X-Tenant-ID` o host/subdominio.
    - Autenticacion JWT propia de la app.
    - CRUD inicial de tenants.
    - Convenciones de aislamiento multi-tenant.
  license:
    name: Proprietary
    url: https://totemhub.com/terms

servers:
  - url: http://127.0.0.1:8000
    description: Local backend
  - url: https://api.totemhub.com
    description: Produccion referencial

tags:
  - name: Health
    description: Observabilidad basica y disponibilidad del backend.
  - name: Auth
    description: Autenticacion multi-tenant y renovacion de tokens JWT.
  - name: Tenants
    description: Administracion y ciclo de vida de tenants.
  - name: Plans
    description: Catalogo de planes SaaS y limites comerciales.

security:
  - bearerAuth: []

paths:
  /health/:
    get:
      tags: [Health]
      operationId: getHealthStatus
      summary: Healthcheck basico
      description: Endpoint publico para verificar disponibilidad del backend.
      security: []
      responses:
        "200":
          description: Backend disponible
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "429":
          description: Limite de solicitudes excedido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Servicio no disponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/login/:
    post:
      tags: [Auth]
      operationId: createAuthLogin
      summary: Login multi-tenant
      description: |
        Autentica contra Supabase Auth y devuelve un par de JWT propios de Totem HUB.

        Resolucion del tenant:
        - Recomendado: enviar `X-Tenant-ID`
        - Alternativa: host/subdominio

        Validaciones:
        - Si el tenant resuelto no coincide con el tenant del usuario, responde `401`.
      security: []
      parameters:
        - $ref: "#/components/parameters/XTenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              default:
                value:
                  email: admin@agencia.test
                  password: secret123
      responses:
        "200":
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /api/auth/refresh/:
    post:
      tags: [Auth]
      operationId: createAuthRefresh
      summary: Renovar access token
      description: Recibe un `refresh_token` valido y devuelve un nuevo par de tokens.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
            examples:
              default:
                value:
                  refresh_token: <jwt-refresh-token>
      responses:
        "200":
          description: Refresh exitoso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /api/tenants/:
    get:
      tags: [Tenants]
      operationId: listTenants
      summary: Listar tenants
      description: Endpoint administrativo para listar tenants registrados.
      parameters:
        - $ref: "#/components/parameters/XTenantID"
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/TenantStatus"
          description: Filtra por estado del tenant.
        - in: query
          name: search
          schema:
            type: string
          description: Busca por nombre o dominio.
        - in: query
          name: ordering
          schema:
            type: string
            enum: [created_at, -created_at, name, -name, domain, -domain, status, -status]
      responses:
        "200":
          description: Lista de tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

    post:
      tags: [Tenants]
      operationId: createTenant
      summary: Crear tenant
      description: Crea un tenant nuevo. Requiere rol `admin` o `superadmin`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantCreateRequest"
            examples:
              default:
                value:
                  name: Agencia Norte
                  domain: norte.example.com
                  plan_id: 8b1fd970-7d3e-4d4e-a2ea-7cf384ef6f6f
                  status: active
      responses:
        "201":
          description: Tenant creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /api/tenants/{tenantId}/:
    parameters:
      - $ref: "#/components/parameters/TenantIdPath"
    get:
      tags: [Tenants]
      operationId: retrieveTenant
      summary: Obtener tenant por id
      responses:
        "200":
          description: Tenant encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    patch:
      tags: [Tenants]
      operationId: partialUpdateTenant
      summary: Actualizar tenant parcialmente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantPatchRequest"
      responses:
        "200":
          description: Tenant actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    put:
      tags: [Tenants]
      operationId: updateTenant
      summary: Reemplazar tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantCreateRequest"
      responses:
        "200":
          description: Tenant actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      tags: [Tenants]
      operationId: deleteTenant
      summary: Eliminar tenant
      responses:
        "204":
          description: Tenant eliminado
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /api/plans/:
    get:
      tags: [Plans]
      operationId: listPlans
      summary: Listar planes SaaS
      description: Endpoint administrativo para listar planes disponibles del SaaS.
      parameters:
        - in: query
          name: is_active
          schema:
            type: boolean
          description: Filtra por estado activo del plan.
        - in: query
          name: search
          schema:
            type: string
          description: Busca por nombre o descripcion.
        - in: query
          name: ordering
          schema:
            type: string
            enum: [created_at, -created_at, name, -name, price_monthly, -price_monthly, price_yearly, -price_yearly]
      responses:
        "200":
          description: Lista de planes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

    post:
      tags: [Plans]
      operationId: createPlan
      summary: Crear plan SaaS
      description: Crea un plan comercial con limites y features del SaaS.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanCreateRequest"
            examples:
              default:
                value:
                  name: Growth
                  description: Plan para agencias medianas
                  price_monthly: 99.00
                  price_yearly: 999.00
                  max_trips: 25
                  max_inscriptions: 500
                  features:
                    - Dashboard avanzado
                    - Soporte prioritario
                  is_active: true
      responses:
        "201":
          description: Plan creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /api/plans/{planId}/:
    parameters:
      - $ref: "#/components/parameters/PlanIdPath"
    get:
      tags: [Plans]
      operationId: retrievePlan
      summary: Obtener plan por id
      responses:
        "200":
          description: Plan encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    patch:
      tags: [Plans]
      operationId: partialUpdatePlan
      summary: Actualizar plan parcialmente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanPatchRequest"
      responses:
        "200":
          description: Plan actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    put:
      tags: [Plans]
      operationId: updatePlan
      summary: Reemplazar plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanCreateRequest"
      responses:
        "200":
          description: Plan actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      tags: [Plans]
      operationId: deletePlan
      summary: Eliminar plan
      responses:
        "204":
          description: Plan eliminado
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer JWT emitido por Totem HUB o validado desde Supabase.

        Claims esperados en access token:
        - `user_id`
        - `tenant_id`
        - `role`
        - `email`
        - `token_type=access`
        - `iat`
        - `exp`

  parameters:
    XTenantID:
      in: header
      name: X-Tenant-ID
      required: false
      description: UUID del tenant. Recomendado para integraciones y desarrollo local.
      schema:
        type: string
        format: uuid
      example: 8b1fd970-7d3e-4d4e-a2ea-7cf384ef6f6f

    TenantIdPath:
      in: path
      name: tenantId
      required: true
      schema:
        type: string
        format: uuid

    PlanIdPath:
      in: path
      name: planId
      required: true
      schema:
        type: string
        format: uuid

  responses:
    ValidationError:
      description: Error de validacion
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"

    UnauthorizedError:
      description: No autenticado o tenant no valido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidTenant:
              value:
                detail: Tenant no encontrado para X-Tenant-ID.

    ForbiddenError:
      description: Sin permisos suficientes
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFoundError:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    AuthTokenResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - token_type
        - access_expires_in
        - refresh_expires_in
        - user
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        access_expires_in:
          type: integer
          example: 900
        refresh_expires_in:
          type: integer
          example: 604800
        user:
          $ref: "#/components/schemas/AuthUser"

    AuthUser:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        nombre:
          type: string
          nullable: true
        tenant_id:
          type: string
          format: uuid
          nullable: true
        role:
          type: string
          enum: [superadmin, admin, staff, user]

    Tenant:
      type: object
      required: [id, name, domain, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 255
        domain:
          type: string
          description: Host o subdominio sin protocolo ni rutas.
          example: norte.example.com
        plan_id:
          type: string
          format: uuid
          nullable: true
        status:
          $ref: "#/components/schemas/TenantStatus"
        created_at:
          type: string
          format: date-time

    TenantCreateRequest:
      type: object
      required: [name, domain]
      properties:
        name:
          type: string
          maxLength: 255
        domain:
          type: string
          example: norte.example.com
        plan_id:
          type: string
          format: uuid
          nullable: true
        status:
          $ref: "#/components/schemas/TenantStatus"

    TenantPatchRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        domain:
          type: string
        plan_id:
          type: string
          format: uuid
          nullable: true
        status:
          $ref: "#/components/schemas/TenantStatus"

    TenantStatus:
      type: string
      enum: [active, inactive, suspended]

    Plan:
      type: object
      required: [id, name, features, is_active, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 120
        description:
          type: string
        price_monthly:
          type: number
          format: float
          nullable: true
        price_yearly:
          type: number
          format: float
          nullable: true
        max_trips:
          type: integer
          nullable: true
        max_inscriptions:
          type: integer
          nullable: true
        features:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    PlanCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 120
        description:
          type: string
        price_monthly:
          type: number
          format: float
        price_yearly:
          type: number
          format: float
        max_trips:
          type: integer
          minimum: 0
        max_inscriptions:
          type: integer
          minimum: 0
        features:
          type: array
          items:
            type: string
        is_active:
          type: boolean

    PlanPatchRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        description:
          type: string
        price_monthly:
          type: number
          format: float
        price_yearly:
          type: number
          format: float
        max_trips:
          type: integer
          minimum: 0
        max_inscriptions:
          type: integer
          minimum: 0
        features:
          type: array
          items:
            type: string
        is_active:
          type: boolean

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string

    ValidationError:
      type: object
      additionalProperties:
        oneOf:
          - type: string
          - type: array
            items:
              type: string

x-multi-tenant:
  tenant-resolution:
    sources:
      - header: X-Tenant-ID
      - host: subdominio o dominio configurado
      - jwt: claim tenant_id validado con secret de app o Supabase
    conflict-behavior: 401 cuando host, X-Tenant-ID o JWT apuntan a tenants distintos
  request-context:
    request_fields:
      - request.tenant
      - request.tenant_id
      - request.tenant_source
    db_runtime_settings:
      - app.current_tenant
      - app.current_user_id
      - app.current_role
  rls:
    enabled: true
    script: scripts/04_rls_policies.sql
    protected_tables:
      - perfiles
      - viajes
      - inscripciones
      - documentos
      - cuotas
      - pagos

x-redis-events:
  description: Eventos referenciales para futura integracion Redis/pub-sub.
  channels:
    - name: tenancy.tenant.created
      payload:
        tenant_id: uuid
        status: active
        occurred_at: date-time
    - name: auth.user.logged_in
      payload:
        user_id: uuid
        tenant_id: uuid
        role: admin
        occurred_at: date-time
    - name: payments.payment.created
      payload:
        payment_id: uuid
        inscription_id: uuid
        tenant_id: uuid
        occurred_at: date-time
