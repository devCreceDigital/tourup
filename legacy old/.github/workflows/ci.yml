name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openapi:
    name: OpenAPI Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint OpenAPI Contract
        run: npx @redocly/cli@latest lint --config .redocly.yaml contracts/openapi.yaml

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install Dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Flake8
        run: python -m flake8 apps/usuarios apps/tenancy apps/viajes apps/inscripciones apps/pagos apps/documentos apps/notificaciones totem_backend manage.py

      - name: Django Checks
        run: python manage.py check

      - name: Django Tests
        run: python manage.py test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_DJANGO_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
      NEXT_PUBLIC_USE_MOCK_API: "false"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run test

      - name: Build
        run: npm run build
