openapi: 3.1.0
info:
  title: Totem HUB Microservices API
  version: 2.0.0
  description: Contratos publicos para la modernizacion DDD hexagonal por microservicios.
servers:
  - url: http://localhost:4100
    description: API gateway local
components:
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
    CommandResponse:
      type: object
      required: [id, status, version, payload]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type:
            - string
            - "null"
          format: uuid
        status:
          type: string
        version:
          type: integer
        payload:
          type: object
paths:
  /identity/capability:
    get:
      summary: Capability identity
      responses:
        "200":
          description: Service capability
  /tenancy/capability:
    get:
      summary: Capability tenancy
      responses:
        "200":
          description: Service capability
