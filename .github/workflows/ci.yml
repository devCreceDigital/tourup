# ──────────────────────────────────────────────────────────────────────────────
# CI — TourUp monorepo
#
# Pipeline que corre en cada PR a main y en pushes a las ramas principales.
#
# Pasos:
#   1. checkout
#   2. instalar dependencias (pnpm, Node 24)
#   3. build — compila packages workspace + servicios (orden topológico)
#   4. test:unit — ejecuta los tests unitarios con Node.js built-in runner
#
# Tests en CI:
#   - services/identity  → auth-security.test.ts + auth-flows.test.ts (57 tests)
#   - apps/api-gateway   → rate-limit.test.ts (34 tests)
#   No necesitan base de datos — usan mocks en memoria.
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches:
      - main
      - ronald_back
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        node-version: [24]

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── pnpm ─────────────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      # ── Node.js ──────────────────────────────────────────────────────────────
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      # ── Dependencias ─────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build ─────────────────────────────────────────────────────────────────
      # Primero los packages compartidos (shared-kernel → service-runtime),
      # luego los servicios. pnpm respeta el orden topológico del workspace.
      - name: Build shared packages
        run: |
          pnpm --filter @totem/shared-kernel build
          pnpm --filter @totem/service-runtime build

      - name: Build services & apps
        run: pnpm --filter '!@totem/shared-kernel' --filter '!@totem/service-runtime' -r build
        continue-on-error: true
        # continue-on-error: los servicios tienen errores TS pre-existentes en
        # los handlers (request: any implícito). Los tests no dependen del
        # build de los servicios — usan tsx/esm para transpilación on-the-fly.

      # ── Tests unitarios ───────────────────────────────────────────────────────
      - name: Run unit tests
        run: pnpm -r --if-present test:unit
        env:
          # Vars mínimas para los handlers de auth
          APP_JWT_SECRET: ci-test-jwt-secret-for-testing-only-32c
          APP_ENV: test
          APP_URL: http://localhost:3001
          REQUIRE_EMAIL_VERIFICATION: "true"
          NOTIFICATIONS_SERVICE_URL: ""

      # ── Type-check (informativo, no bloquea la PR) ────────────────────────────
      - name: Type-check workspace packages
        run: |
          pnpm --filter @totem/shared-kernel run test
          pnpm --filter @totem/service-runtime run test
        # Solo falla si los packages compartidos (sin dependencias circulares)
        # tienen errores de tipos.

  # ── Resumen en PR ────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    steps:
      - name: Report result
        run: |
          if [ "${{ needs.build-and-test.result }}" = "success" ]; then
            echo "✅ CI passed — build + unit tests OK"
          else
            echo "❌ CI failed — check the build-and-test job for details"
            exit 1
          fi
